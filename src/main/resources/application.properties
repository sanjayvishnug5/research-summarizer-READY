

server.port=8080

# Anthropic Claude API
anthropic.api-key=${ANTHROPIC_API_KEY:demo-mode}
anthropic.model=claude-haiku-4-5-20251001
anthropic.report-model=claude-sonnet-4-6
anthropic.max-tokens=2048

# Tavily Web Search
tavily.api-key=${TAVILY_API_KEY:demo-mode}
tavily.base-url=https://api.tavily.com
tavily.max-results=10

# OpenAI MCP Server (public, read-only, no auth needed)
mcp.base-url=${OPENAI_MCP_URL:https://developers.openai.com/mcp}
mcp.timeout-seconds=15
mcp.sufficient-threshold=2

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.assessment=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [trace=%X{traceId}] - %msg%n

# Jackson
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
